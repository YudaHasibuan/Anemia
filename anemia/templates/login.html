<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - YOLOv11 Anemia</title>
    <link rel="stylesheet" href="/static/css/style.css?v=7">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007bff">
    <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">
</head>
<body class="login-body">

    <!-- Flash Messages -->
    <div class="flash-messages">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-alert flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <div class="login-card-container">
        <div class="login-card">
            <div class="login-logo">
                YOLO <span>V11</span>
            </div>
            <div class="login-subtitle">
                Masuk ke Dashboard Panel Admin Anemia
            </div>
            
            <form action="/login" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Masukkan username..." required autofocus>
                </div>
                
                <div class="form-group" style="margin-bottom: 25px;">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Masukkan password..." required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Masuk</button>
            </form>
            
            <div style="text-align: center; margin-top: 25px; font-size: 0.8rem;">
                <a href="/" style="color: var(--secondary); text-decoration: none;">&larr; Kembali ke Beranda</a>
            </div>
        </div>
    </div>

    <script>
        // Dismiss flash alerts after 3 seconds
        document.addEventListener('DOMContentLoaded', () => {
            const alerts = document.querySelectorAll('.flash-alert');
            alerts.forEach(alert => {
                setTimeout(() => {
                    alert.style.opacity = '0';
                    alert.style.transform = 'translateY(-10px)';
                    alert.style.transition = 'all 0.5s ease';
                    setTimeout(() => alert.remove(), 500);
                }, 3000);
            });
        });
    </script>
</body>
</html>
